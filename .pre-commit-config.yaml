ci:
    skip: [gates]
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
        exclude: ^docs/sprints/S11/
    -   id: end-of-file-fixer
        exclude: ^docs/sprints/S11/
    -   id: check-yaml
    -   id: check-json
    -   id: check-case-conflict
    -   id: mixed-line-ending
-   repo: local
    hooks:
    -   id: gates
        name: Operator Gates (Build/Test/Lint/Stoplight)
        entry: ./gates.sh
        language: script
        pass_filenames: false
