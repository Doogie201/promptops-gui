codecov:
  strict_yaml_branch: default

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  after_n_builds: 1

coverage:
  precision: 2
  round: down
  range: "0..100"
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
